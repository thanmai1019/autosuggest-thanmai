<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeingInfinity - Auto Suggest</title>
    <style>
        /* Top Navigation Bar: Aligns left and right items perfectly on the same row */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            font-family: Arial, sans-serif;
            font-size: 16px;
        }

        /* Settings Gear Icon */
        .settings-link {
            font-size: 24px;
            text-decoration: none;
            color: #333;
            line-height: 1;w
        }

        /* Status Area on the Right */
        .status-area {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #202124;
        }

        /* Big dot beside Online text */
        .status-dot {
            font-size: 14px;
            color: #070a08; /* Change to #202124 if you want a plain black dot */
            line-height: 1;
        }

        /* Two distinct colors for the logo text */
        .color-being {
            color: #202124; /* Dark charcoal/black */
        }
        .color-infinity {
            color: #1a73e8; /* Vibrant tech blue */
        }

        /* Curved wrapper containing both the left icon and the input field */
        .search-container {
            display: inline-flex;
            align-items: center;
            border: 1px solid #ccc;
            border-radius: 25px;
            padding: 5px 15px;
            width: 450px;
            max-width: 80vw;
            background-color: #ffffff;
        }

        .search-container:focus-within {
            border-color: #888;
        }

        /* Styles the lens button sitting inside on the left */
        .lens-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px 10px 5px 5px;
            font-size: 18px;
            display: flex;
            align-items: center;
        }

        /* Seamless input field without its own internal borders */
        .search-input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 16px;
            background: transparent;
        }
    </style>
</head>
<body bgcolor="#FFFFFF" style="margin: 0;">

    <header class="top-nav">
        <a href="#settings" class="settings-link" aria-label="Settings" title="Settings">
            &#9881;
        </a>

        <div class="status-area">
            <span class="status-dot">&#9679;</span>
            <span>Online</span>
            <span>&#128340;</span> <span>0.02</span>
        </div>
    </header>

    <main align="center" style="margin-top: 50px;">
        
        <h1>
            <span class="color-being">Being</span><span class="color-infinity">Infinity</span>
        </h1>

        <p>
            <small>One million phrases, four algorithms, prefix based auto suggest</small>
        </p>

        <form action="#" method="get">
            <div class="search-container">
                
                <button type="submit" class="lens-btn" aria-label="Search">
                    &#128269;
                </button>

                <input 
                    type="search" 
                    class="search-input"
                    id="search-bar" 
                    name="query" 
                    list="phrase-suggestions" 
                    placeholder="Start typing..." 
                    autocomplete="off"
                >

            </div>

            <datalist id="phrase-suggestions">
                <option value="prefix based search">
                <option value="prefix trees and tries">
                <option value="four algorithms overview">
                <option value="one million phrases dataset">
            </datalist>
        </form>

    </main>

</body>
</html>
